name: edufocus
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  material_design_icons_flutter: ^7.0.7296

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Audio
  flutter_tts: ^4.2.0
  audioplayers: ^6.1.0

  # Animations
  confetti: ^0.7.0
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lessons/
    - assets/sounds/
    - assets/images/

name: edufocus
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  audioplayers: ^6.1.0
  cached_network_image: ^3.4.1
  camera: ^0.12.0+1
  confetti: ^0.7.0
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.3.2
  flutter_svg: ^2.0.9
  flutter_tts: ^4.2.0
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  image: ^4.8.0
  lottie: ^3.3.3
  material_design_icons_flutter: ^7.0.7296
  permission_handler: ^12.0.1
  pretty_dio_logger: ^1.4.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  flutter_localizations:
    sdk: flutter  

flutter:
  uses-material-design: true

  assets:
    - assets/lessons/
    - assets/sounds/
    - assets/images/
    - assets/images/character/body/
    - assets/images/character/hair/
    - assets/images/character/hats/
    - assets/images/character/head/
    - assets/images/character/icons/
    - assets/images/character/legs/
flutter_intl:
  enabled: true
